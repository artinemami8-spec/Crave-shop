<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIP STORE | Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Data ---
        const products = [
            { id: 1, name: "VINTAGE OVERSIZED TEE", category: "tshirt", price: 45, image: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?q=80&w=500", desc: "Heavyweight 300GSM cotton.", sizes: ["S", "M", "L", "XL"] },
            { id: 2, name: "BAGGY CARGO PANTS", category: "pants", price: 85, image: "https://images.unsplash.com/photo-1552902865-b72c031ac5ea?q=80&w=500", desc: "Multi-pocket tactical design.", sizes: ["30", "32", "34"] },
            { id: 3, name: "CYBERPUNK HOODIE", category: "hoodie", price: 120, image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=500", desc: "Reflective prints. Fleece interior.", sizes: ["M", "L", "XL"] },
            { id: 4, name: "STREET BEANIE", category: "hats", price: 25, image: "https://images.unsplash.com/photo-1576822410457-3a18a9947702?q=80&w=500", desc: "Hand-knitted premium wool.", sizes: ["OS"] },
            { id: 5, name: "DARK SHADES X1", category: "glasses", price: 150, image: "https://images.unsplash.com/photo-1511499767390-a73359586af8?q=80&w=500", desc: "UV400 Protection.", sizes: ["OS"] }
        ];

        // --- App Component ---
        function App() {
            const [view, setView] = useState('home'); // home, buy, cart
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [filter, setFilter] = useState("all");

            const addToCart = (product) => {
                setCart([...cart, { ...product, cartId: Math.random() }]);
                alert("Added to Stash!");
            };

            const filteredItems = products.filter(p => 
                (filter === "all" || p.category === filter) &&
                p.name.toLowerCase().includes(search.toLowerCase())
            );

            const total = cart.reduce((sum, item) => sum + item.price, 0);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center">
                        <h1 onClick={() => setView('home')} className="text-2xl font-black text-red-600 cursor-pointer tracking-tighter">DRIP.STORE</h1>
                        <div className="flex gap-6 font-bold text-xs uppercase tracking-widest">
                            <button onClick={() => setView('buy')} className="hover:text-red-500 transition">Buy Now</button>
                            <button onClick={() => setView('cart')} className="relative group">
                                <span>Cart ({cart.length})</span>
                            </button>
                        </div>
                    </nav>

                    <div className="pt-24 px-6">
                        {view === 'home' && (
                            <motion.div initial={{opacity:0}} animate={{opacity:1}} className="h-[70vh] flex flex-col items-center justify-center text-center">
                                <h1 className="text-7xl font-black italic mb-6 leading-none">NEW DROPS</h1>
                                <button onClick={() => setView('buy')} className="bg-red-600 px-10 py-4 font-black rounded-full hover:scale-105 transition">EXPLORE SHOP</button>
                            </motion.div>
                        )}

                        {view === 'buy' && (
                            <div>
                                <input 
                                    type="text" 
                                    placeholder="Search gear..." 
                                    className="w-full mb-8 bg-white/5 border border-white/10 rounded-xl p-4 outline-none focus:border-red-600"
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    {filteredItems.map(p => (
                                        <div key={p.id} className="bg-white/5 p-4 rounded-2xl border border-white/5">
                                            <img src={p.image} className="w-full aspect-[3/4] object-cover rounded-xl mb-4" />
                                            <h3 className="font-bold text-sm">{p.name}</h3>
                                            <p className="text-red-500 font-black mb-4">${p.price}</p>
                                            <button onClick={() => addToCart(p)} className="w-full bg-white text-black font-black py-2 rounded-lg text-xs uppercase hover:bg-red-600 hover:text-white transition">Buy</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'cart' && (
                            <div className="max-w-2xl mx-auto">
                                <h2 className="text-3xl font-black mb-8 italic uppercase">Your Stash</h2>
                                {cart.map(item => (
                                    <div key={item.cartId} className="flex items-center gap-4 bg-white/5 p-4 rounded-xl mb-4">
                                        <img src={item.image} className="w-16 h-16 object-cover rounded" />
                                        <div className="flex-1 font-bold">{item.name}</div>
                                        <div className="font-black text-red-500">${item.price}</div>
                                    </div>
                                ))}
                                <div className="mt-10 p-6 bg-red-600 rounded-2xl flex justify-between items-center font-black">
                                    <span>Total: ${total}</span>
                                    <button className="bg-black text-white px-6 py-2 rounded-lg uppercase italic">Checkout</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
